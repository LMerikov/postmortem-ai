server {
    listen 80;
    server_name postmortem-ai.cubepath.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name postmortem-ai.cubepath.app;

    ssl_certificate /etc/letsencrypt/live/postmortem-ai.cubepath.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/postmortem-ai.cubepath.app/privkey.pem;

    # Frontend static files
    root /var/www/postmortem-ai;
    index index.html;

    # React SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to Flask backend
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
